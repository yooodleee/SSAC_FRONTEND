# SSAC ErrorCode Contract
# 이 파일은 BE 팀이 관리하는 단일 소스입니다.
# FE는 이 파일을 기준으로 src/constants/errorMessages.ts를 갱신합니다.
# Contract 변경 시 FE 팀에 GitHub Issue로 알림을 전송하세요.
#
# 갱신 절차:
#   1. version 및 updatedAt 수정
#   2. errors 목록 추가/변경/삭제
#   3. FE 팀에 GitHub Issue 생성

